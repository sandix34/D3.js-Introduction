<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://d3js.org/d3.v5.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Learn D3.js V5</title>
  </head>
  <body>
    <h1>Upside-Down SVGs</h1>
    <div id="barchart"></div>
    <script>
      const data = [];

      for (let i = 0; i < 20; i++) {
        const num = Math.floor(d3.randomUniform(1, 60)());
        data.push(num);
      }

      // create an SVG element
      const svg = d3.select("#barchart")
                  .append("svg")
                  .attr("width", 800)
                  .attr("height", 400)

      // bind data and create the bars
      svg.selectAll("rect")
        .data(data)
        .enter()
        .append("rect")
        .attr("x", function(d, i){
          return i*(1000/data.length);
        })
        .attr("y", 0)
        .attr("width", 800/data.length)
        .attr("height", function(d){
          return d;
        })

    </script>
  </body>
</html>
